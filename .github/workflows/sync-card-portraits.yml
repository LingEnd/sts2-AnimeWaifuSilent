name: Sync Card Portrait Dictionary

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "AnimeWaifuSilent/card_portraits/**"

permissions:
  contents: write

concurrency:
  group: sync-card-portraits-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-dictionary:
    name: Sync portrait dictionary from files
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update generated portrait dictionary
        run: ./scripts/Sync-CardPortraitDictionary.ps1

      - name: Commit generated changes
        run: |
          if (git diff --quiet -- AnimeWaifuSilentCode/CardportraitsReplacement.cs) {
            Write-Host "No dictionary changes to commit."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AnimeWaifuSilentCode/CardportraitsReplacement.cs
          git commit -m "Auto-sync portrait dictionary from new assets"
          git push
